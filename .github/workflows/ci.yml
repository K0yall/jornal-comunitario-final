# Nome do Workflow visível na aba Actions do GitHub
name: Pipeline de Integração Contínua (CI)

# Define o gatilho de disparo do pipeline (Sempre que houver um push na branch main)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Define o sistema operacional da máquina virtual da nuvem do GitHub
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Faz o download (checkout) do código do repositório para a máquina virtual
    - name: Checkout do código fonte
      uses: actions/checkout@v4

    # Passo 2: Configura o ambiente de execução com a versão correta do Python
    - name: Configurar o Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Passo 3: Instala as dependências do projeto mapeadas no requirements.txt
    - name: Instalar dependências da aplicação
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Passo 4 (Etapa Adicional Obrigatória): Análise estática com Flake8 (Lint)
    # Garante que o código siga as boas práticas do PEP 8, checando erros de sintaxe
    - name: Executar Análise Estática de Código (Lint com Flake8)
      run: |
        # Para o pipeline se houver erros de sintaxe ou nomes indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisa sobre problemas de estilo sem quebrar o build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Passo 5: Executa os 4 testes unitários automatizados usando o Pytest
    - name: Executar suíte de testes unitários
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/api
        pytest api/tests/